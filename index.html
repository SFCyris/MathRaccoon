  <!-- App init -->
  <script>
    (function () {
      const S   = MR.Storage;
      const Set = MR.Settings;
      const R   = MR.Router;
      const T   = (k, v) => MR.Strings.t(k, v);

      // Apply persisted settings to the body (calm, high-contrast, locale).
      Set.apply();

      // Mount the playful background scene once (trees, flowers, clouds…).
      if (MR.Scenery && MR.Scenery.mount) MR.Scenery.mount();


      // Router handlers
      R.on("hub",     () => MR.Hub.renderHub());
      R.on("module",  (p) => MR.Hub.renderModule(p));
      R.on("chapter", (p) => MR.Runner.runChapter(p));
      R.on("arcade",  (p) => MR.Runner.runArcade(p));
      R.on("teach",   (p) => MR.Teach.runTeach(p));
      R.on("admin",   () => MR.Admin.render());
      R.on("rewards", (p) => MR.Gallery.render(p.tab));

      // Top bar
      function syncControlButtons() {
        const s = S.getSettings();
        document.getElementById("btn-music").classList.toggle("active", !!s.musicOn);
        document.getElementById("btn-voice").classList.toggle("active", !!s.voiceOn);
        document.getElementById("btn-calm").classList.toggle("active",  !!s.calmMode);
        // Refresh admin view if it's the current one — header toggles can
        // change values displayed there.
        if (R.parse().view === "admin" && MR.Admin) MR.Admin.render();
      }
      syncControlButtons();

      document.getElementById("btn-music").addEventListener("click", () => {
        const s = S.getSettings();
        Set.set({ musicOn: !s.musicOn });
        if (!s.musicOn) MR.Audio.startMusic(); else MR.Audio.stopMusic();
        syncControlButtons();
      });
      document.getElementById("btn-voice").addEventListener("click", () => {
        const s = S.getSettings();
        Set.set({ voiceOn: !s.voiceOn });
        syncControlButtons();
      });
      document.getElementById("btn-calm").addEventListener("click", () => {
        Set.toggleCalm();
        syncControlButtons();
      });
      document.getElementById("btn-friends").addEventListener("click", () => {
        R.go(R.rewardsHash("friends"));
      });
      document.getElementById("btn-journal").addEventListener("click", () => {
        R.go(R.rewardsHash("journal"));
      });
      document.getElementById("btn-critters").addEventListener("click", () => {
        R.go(R.rewardsHash("critters"));
      });
      document.getElementById("btn-trophies").addEventListener("click", () => {
        R.go(R.rewardsHash("trophies"));
      });

      // Initial route
      R.dispatch();
    })();
  </script>
